    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Inter:wght@400;700;900&family=Quicksand:wght@400;500;600&display=swap');

        :root {
            --r-main-font: 'Inter', Helvetica, sans-serif;
            --r-heading-font: 'Inter', Helvetica, sans-serif;
            --r-heading-font-weight: 900;
            --r-main-color: #ffffff;
            --r-background-color: #050510;
            /* Deep navy / black */
            --r-heading-text-transform: none;
            --r-link-color: #00e5ff;
            /* Electric blue */
            --r-link-color-hover: #00b3cc;
            --r-selection-background-color: #00e5ff;
            --brand-primary: #0076a3;
            /* From sciencephalon.com */
        }

        .sci-logo-container {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px;
            text-align: left;
            z-index: 99999;
            pointer-events: none;
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            transform-origin: top left;
            transform: scale(3);
            /* 300% on first slide */
        }

        .sci-logo-container.small-logo {
            transform: translate(0, calc(100vh - 160px)) scale(2);
            /* 200% on other slides */
        }

        .sci-logo-name {
            font-family: 'Audiowide', sans-serif;
            font-size: 1.1em;
            line-height: 1;
            color: #ffffff;
            display: block;
        }

        .sci-logo-name .logo-ai {
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .sci-logo-divider {
            display: block;
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.45);
            margin: 5px 0 4px;
        }

        .sci-logo-tagline {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.6em;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.04em;
            display: block;
        }

        .global-slide-title {
            position: fixed;
            top: 30px;
            left: 40px;
            font-size: 2.6em;
            font-weight: 800;
            font-family: var(--r-heading-font);
            color: var(--r-main-color);
            z-index: 99999;
            pointer-events: none;
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.9);
            letter-spacing: -0.02em;
        }

        .global-slide-title.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .reveal .accent {
            color: #00e5ff;
        }

        .reveal h1,
        .reveal h2,
        .reveal h3,
        .reveal h4 {
            letter-spacing: -0.02em;
            line-height: 1.1;
            margin-bottom: 0.5em;
        }

        .reveal p {
            font-size: 1.4em;
            font-weight: 700;
            line-height: 1.2;
        }

        .reveal .slide-number {
            color: #00e5ff;
            background-color: transparent;
        }

        /* --- Background Animations --- */
        @keyframes kenBurnsBackground {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.15);
            }
        }

        .ken-burns-bg .reveal-viewport,
        .ken-burns-bg .slide-background-content {
            animation: kenBurnsBackground 40s ease-in-out infinite alternate !important;
        }

        @keyframes float-subtle {
            0% {
                transform: translateY(0px) scale(0.8) rotate(-5deg);
            }

            50% {
                transform: translateY(-25px) scale(0.8) rotate(5deg);
            }

            100% {
                transform: translateY(0px) scale(0.8) rotate(-5deg);
            }
        }

        @keyframes s2LoopTopText {

            0%,
            2% {
                opacity: 0;
            }

            10%,
            85% {
                opacity: 1;
            }

            90%,
            100% {
                opacity: 0;
            }
        }

        @keyframes s2LoopTools {

            0%,
            2% {
                opacity: 0;
                filter: blur(10px);
            }

            15%,
            40% {
                opacity: 0.15;
                filter: blur(0px);
            }

            50%,
            100% {
                opacity: 0;
                filter: blur(10px);
            }
        }

        @keyframes s2LoopCross {

            0%,
            18% {
                opacity: 0;
                transform: scale(0);
            }

            22% {
                transform: scale(1.4);
            }

            25%,
            85% {
                opacity: 1;
                transform: scale(1);
            }

            90%,
            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        @keyframes s2LoopBottomText {

            0%,
            40% {
                opacity: 0;
            }

            48%,
            85% {
                opacity: 1;
            }

            90%,
            100% {
                opacity: 0;

            }

            60%,
            85% {
                opacity: 0.25;
                filter: blur(0px);

            90%,
            100% {

                filter: blur(10px);

        @keyframes s2LoopCheck {

            0%,

                opacity: 0;
                transform: scale(0);
            }

            62% {
                transform: scale(1.4);
            }

            65%,
            85% {
                opacity: 1;
                transform: scale(1);
            }

            90%,
            100% {
                opacity: 0;
                transform: scale(0);
            }
        }

        .present .s2-text-top {
            animation: s2LoopTopText 16s infinite;
        }

        .present .s2-icons-tools i {
            animation: s2LoopTools 16s infinite, float-subtle 8s ease-in-out infinite alternate;
            color: #ffffff;
        }

        .present .s2-cross {
            animation: s2LoopCross 16s infinite;
        }

        .present .s2-text-bottom {
            animation: s2LoopBottomText 16s infinite;
        }

        .present .s2-icons-physics i {
            animation: s2LoopPhysics 16s infinite, float-subtle 9s ease-in-out infinite alternate;
            color: var(--brand-primary);
        }

        .present .s2-check {
            animation: s2LoopCheck 16s infinite;
        }

        /* --- Slide 2B Ancestry Animations --- */

            justify-content: center;
            align-items: center;
            width: 100%;

            align-items: center;
            width: fit-content;
            margin-top: 0px;
            transform: scale(0.65);
            transform-origin: top center;
        }

        .a-row {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            width: auto;
        }

        .a-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 130px;
            z-index: 10;
        }

        .a-node.highlight {
            width: 220px;

        .a-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2);
            object-fit: cover;
            object-position: top center;
            margin-bottom: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            transition: all 0.4s ease;
            background-color: #1a1a2e;
        }

        .a-node.highlight .a-avatar {
            width: 180px;
            height: 180px;
            border: 5px solid var(--r-link-color);
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.6);
            transform: scale(1.05);
        }

        .bg-white-logo {
            background-color: white !important;
            padding: 10px;
            object-fit: contain;
        }

        .a-node.highlight .bg-white-logo {
            padding: 25px;
        }

        .a-name {
            font-size: 0.45em;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 2px;
            line-height: 1.1;
        }

        .a-node.highlight .a-name {
            font-size: 0.55em;
            color: var(--r-link-color);
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .a-org {
            font-size: 0.35em;
            color: #aaaaaa;
        }

        .a-node.highlight .a-org {
            font-size: 0.55em;
            color: #dddddd;
        }

        .a-nobel {
            font-size: 0.4em;
            color: #ffd700;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 215, 0, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
            display: inline-block;
        }

        .a-relation-text {
            font-size: 0.35em;
            color: var(--r-link-color);
            text-transform: none;
            letter-spacing: 1px;
            background: rgba(0, 229, 255, 0.1);
            padding: 3px 6px;
            border-radius: 4px;
            white-space: nowrap;

        .a-arrow {
            display: flex;

            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.2em;
            margin: 0 10px;
            min-width: 60px;
        }

        .a-arrow i {
            margin-bottom: 5px;
        }

        .a-turn {
            align-self: flex-end;
            margin-right: 35px;
            margin-top: -10px;
            margin-bottom: -10px;
        }

        /* --- Slide 3 Equation Animations --- */
        .s3-bg-equations {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .impact-container {
            display: none !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 70vh;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .present .impact-container {
            display: flex !important;
        }

        .impact-text {
            font-size: 1.5em;
            font-weight: 700;
            line-height: 1.2;
            text-align: center;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.9);
            z-index: 20;
            position: relative;
            margin: 0 auto;
        }

        .s3-bg-equations .math-eq {
            font-family: 'Times New Roman', Times, serif;
            font-size: 2.2em;
            font-style: italic;
            opacity: 0;
            position: absolute;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }

        .eq-maxwell-1 {
            top: -10%;
            left: 15%;
            font-size: 2.5em;
        }

        .eq-maxwell-2 {
            top: 75%;
            left: 10%;
            font-size: 2em;
        }

        .eq-eigen-1 {

        .eq-eigen-2 {

            left: 80%;

        .eq-prob {

            font-size: 2.4em;
        }

        @keyframes float-eq-vertical {

            0%,
            100% {
                transform: translateY(0) scale(0.9) rotate(-2deg);
                opacity: 0;
                filter: blur(4px);
            }

            20%,
            80% {
                opacity: 0.15;
                filter: blur(0px);
            }

            50% {
                transform: translateY(40px) scale(1.05) rotate(2deg);
                opacity: 0.25;
                filter: blur(0px);
            }
        }

        @keyframes float-eq-horizontal {

            0%,
            100% {
                transform: translateX(0) scale(0.8) rotate(3deg);
                opacity: 0;
                filter: blur(5px);
            }

            20%,
            80% {
                opacity: 0.2;
                filter: blur(1px);
            }

            50% {
                transform: translateX(-40px) scale(1) rotate(-1deg);
                opacity: 0.3;
                filter: blur(0px);
            }
        }

        .present .s3-bg-equations .math-eq.eq-maxwell-1 {
            animation: float-eq-vertical 12s infinite alternate 0.5s;
        }

        .present .s3-bg-equations .math-eq.eq-eigen-1 {
            animation: float-eq-horizontal 15s infinite alternate 1.5s;
        }

        .present .s3-bg-equations .math-eq.eq-prob {
            animation: float-eq-vertical 18s infinite alternate 3.0s;
        }

        .present .s3-bg-equations .math-eq.eq-maxwell-2 {
            animation: float-eq-horizontal 14s infinite alternate 2.0s;

        .present .s3-bg-equations .math-eq.eq-eigen-2 {

        }

        .present .s3-bg-equations .math-eq.eq-schrodinger {
            animation: float-eq-horizontal 16s infinite alternate 1.0s;
        }

        .s5-bg-crowd {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: repeat(40, 1fr);
            grid-template-rows: repeat(25, 1fr);
            gap: 2px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.15;
            padding: 10px;
            overflow: hidden;
        }

        .s5-bg-crowd i {
