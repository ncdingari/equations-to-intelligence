        // The Maturity Stack Animation (Slide 18, h=17)
        function initMaturityStack() {
            if (window._maturityStackReady) return;
            window._maturityStackReady = true;
            const canvas = document.createElement('canvas');
            canvas.id = 'the-maturity-stack-canvas';
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.zIndex = '-1';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let W, H;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const layers = [
                { name: "Math", color: "#00e5ff" },
                { name: "Physics", color: "#ff00ff" },
                { name: "Chemistry", color: "#30d158" },
                { name: "Biology", color: "#ffd700" },
                { name: "Quantum", color: "#ff3b30" }
            ];

            let startTime = performance.now();

            function drawIsoPlane(cx, cy, radius, color, alpha) {
                ctx.beginPath();
                ctx.moveTo(cx, cy - radius * 0.45);
                ctx.lineTo(cx + radius, cy);
                ctx.lineTo(cx, cy + radius * 0.45);
                ctx.lineTo(cx - radius, cy);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            function drawFrame(now) {
                if (!shouldAnimate(canvas)) {
                    requestAnimationFrame(drawFrame);
                    return;
                }

                ctx.clearRect(0, 0, W, H);

                let elapsed = (now - startTime) / 1000;
                let cycle = elapsed % 8; // Reset every 8 seconds

                let cx = W / 2;
                let cy = H * 0.65;
                let radius = W * 0.15;
                let gapY = 55;

                for (let i = 0; i < layers.length; i++) {
                    let buildTime = i * 0.5;
                    let appearProgress = 0;

                    if (cycle > buildTime) {
                        appearProgress = Math.min(1, (cycle - buildTime) * 2.0);
                    }
                    if (cycle > 7) {
                        appearProgress = Math.max(0, 1 - (cycle - 7) * 4.0);
                    }

                    if (appearProgress <= 0) continue;

                    let floatY = Math.sin(cycle * 2 + i) * 6;
                    let y = cy + 50 - (50 + i * gapY) * appearProgress + floatY;
                    let alpha = appearProgress * 0.2;
                    let gridAlpha = appearProgress * 0.5;

                    drawIsoPlane(cx, y, radius, layers[i].color, alpha);

                    ctx.fillStyle = `rgba(255, 255, 255, ${gridAlpha})`;
                    let gridSize = 3;
                    for (let r = -gridSize; r <= gridSize; r++) {
                        for (let c = -gridSize; c <= gridSize; c++) {
                            let px = cx + (r - c) * (radius / 4);
                            let py = y + (r + c) * ((radius * 0.45) / 4);
                            ctx.beginPath();
                            ctx.arc(px, py, 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }

                    if (appearProgress > 0.5) {
                        ctx.fillStyle = `rgba(255, 255, 255, ${(appearProgress - 0.5) * 2})`;
                        ctx.font = 'bold 18px Inter';
                        ctx.textAlign = 'right';
                        ctx.textBaseline = 'middle';
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = layers[i].color;
                        ctx.fillText(layers[i].name, cx - radius - 30, y);
                        ctx.shadowBlur = 0;

                        // Vertical connection lines going down
                        if (i > 0) {
                            ctx.strokeStyle = `rgba(255, 255, 255, ${(appearProgress - 0.5)})`;
                            ctx.beginPath();
                            ctx.moveTo(cx - radius - 20, y);
                            ctx.lineTo(cx - radius - 20, y + gapY);
                            ctx.stroke();
                        }
                    }
                }

                requestAnimationFrame(drawFrame);
            }
            requestAnimationFrame(drawFrame);
        }

        // Noise to Signal Animation (Slide 18, h=17)
        function initNoiseSignal() {
            if (window._noiseSignalReady) return;
            window._noiseSignalReady = true;

            const canvas = document.createElement('canvas');
            canvas.id = 'noise-signal-canvas';
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.zIndex = '-1';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let W, H;

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const N = 250; // Optimized from 400
            const particles = [];
            for (let i = 0; i < N; i++) {
                particles.push({
                    id: i,
                    rx: Math.random() * 2 - 1,
                    ry: Math.random() * 2 - 1,
                    x: Math.random() * window.innerWidth,
                    y: Math.random() * window.innerHeight,
                    vx: 0,
                    vy: 0
                });
            }

            let startTime = performance.now();

            function drawFrame(now) {
                if (!shouldAnimate(canvas)) {
                    requestAnimationFrame(drawFrame);
                    return;
                }

                ctx.clearRect(0, 0, W, H);
                ctx.globalAlpha = 1.0; 

                let elapsed = (now - startTime) / 1000;
                let cycle = elapsed % 12;

                let clarity = 0;
                if (cycle > 4 && cycle <= 6) clarity = (cycle - 4) / 2;
                else if (cycle > 6 && cycle <= 10) clarity = 1;
                else if (cycle > 10 && cycle <= 12) clarity = 1 - (cycle - 10) / 2;

                clarity = clarity < 0.5 ? 2 * clarity * clarity : 1 - Math.pow(-2 * clarity + 2, 2) / 2;

                // Draw Text
                ctx.globalAlpha = 0.2 + clarity * 0.4;
                ctx.fillStyle = `rgb(0, 229, 255)`;
                ctx.font = 'bold 24px Inter';
                ctx.textAlign = 'center';
                ctx.fillText(clarity > 0.5 ? "SIGNAL" : "NOISE", W / 2, H * 0.3);

                // Draw Wave Line
                if (clarity > 0.8) {
                    ctx.beginPath();
                    ctx.moveTo(0, H / 2);
                    for (let x = 0; x < W; x += 20) {
                        let y = H / 2 + Math.sin(x * 0.01 + elapsed * 2) * (H * 0.2);
                        ctx.lineTo(x, y);
                    }
                    ctx.strokeStyle = 'rgba(0, 229, 255, 0.15)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }

                // Update and Batch Draw Particles
                let r = 255 * (1 - clarity);
                let g = 229 * clarity;
                let b = 255;
                ctx.fillStyle = `rgb(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)})`;
                ctx.globalAlpha = 0.4 + (clarity * 0.4);
                
                let pRadius = clarity > 0.5 ? 2 : 3.5;
                ctx.beginPath();
                for (let i = 0; i < N; i++) {
                    let p = particles[i];

                    // Noise Target
                    let noiseX = W / 2 + p.rx * (W * 0.45) + Math.sin(elapsed * 2 + p.id * 0.5) * 30;
                    let noiseY = H / 2 + p.ry * (H * 0.45) + Math.cos(elapsed * 3 + p.id * 0.3) * 30;

                    // Signal Target
                    let t = i / N;
                    let signalX = W * 0.1 + t * (W * 0.8);
                    let signalY = H / 2 + Math.sin(signalX * 0.01 + elapsed * 2) * (H * 0.2);

                    let targetX = noiseX * (1 - clarity) + signalX * clarity;
                    let targetY = noiseY * (1 - clarity) + signalY * clarity;

                    let dx = targetX - p.x;
                    let dy = targetY - p.y;

                    p.vx = (p.vx + dx * 0.05) * 0.85;
                    p.vy = (p.vy + dy * 0.05) * 0.85;
                    p.x += p.vx;
                    p.y += p.vy;

                    ctx.moveTo(p.x + pRadius, p.y);
                    ctx.arc(p.x, p.y, pRadius, 0, Math.PI * 2);
                }
                ctx.fill();


                requestAnimationFrame(drawFrame);
            }
            requestAnimationFrame(drawFrame);

        }

                    // rotate around X
                    let y1 = y * Math.cos(rotX) - z * Math.sin(rotX);
                    let z1 = y * Math.sin(rotX) + z * Math.cos(rotX);
                    // rotate around Y
                    let x2 = x * Math.cos(rotY) + z1 * Math.sin(rotY);
                    let z2 = -x * Math.sin(rotY) + z1 * Math.cos(rotY);

                    // perspective
                    let scale = 1.0;
                    return { px: cx + x2 * radius * scale, py: cy - y1 * radius * scale, pz: z2 };
                }

                        let z = Math.cos(lat) * Math.sin(lon);

                    ctx.strokeStyle = `rgba(0, 229, 255, 0.1)`;

                let cycle = elapsed % 8; // 8 seconds cycle
                let psiTheta = 0; // vertical angle
                let psiPhi = 0;   // horizontal angle

                if (cycle < 0.1) {

                    psiTheta = Math.PI / 2 + Math.sin(cycle * 1.5) * 1.0;

                    });

                const ring2Count = 14;
                const ring2R = Math.min(W, H) * 0.38;
                for (let i = 0; i < ring2Count; i++) {

                        orbitDir: Math.random() > 0.5 ? 1 : -1
                    });
                    // Connect to nearest ring1 node
                    let nearestRing1 = 1 + Math.round((i / ring2Count) * ring1Count) % ring1Count;
                    edges.push({ from: nearestRing1, to: nodes.length - 1, ring: 2 });
                }

                // Sparse cross-connections between ring2 nodes
                const ring2Start = 1 + ring1Count;
                const ring2End = nodes.length - 1;
                for (let i = ring2Start; i <= ring2End; i++) {

                        for (let r = 0; r < 3; r++) {

                            ctx.arc(n.x, n.y, rippleR, 0, Math.PI * 2);
                            ctx.strokeStyle = `rgba(0, 229, 255, ${rippleAlpha})`;
                            ctx.lineWidth = 1.5;
                            ctx.stroke();

                        // Core anchor node - vivid glowing

                        grad.addColorStop(0.4, 'rgba(0,229,255,0.9)');
                        grad.addColorStop(1, 'rgba(0,229,255,0)');
                        ctx.beginPath();
                        ctx.arc(n.x, n.y, n.r + 8 + pulse * 4, 0, Math.PI * 2);
                        ctx.fillStyle = grad;
                        ctx.shadowBlur = 40;
                        ctx.shadowColor = '#00e5ff';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    } else {
                        let isRing1 = idx <= 6;
                        let alpha = isRing1 ? 0.5 + pulse * 0.4 : 0.2 + pulse * 0.2;
                        let color = isRing1 ? `rgba(0,229,255,${alpha})` : `rgba(140,170,255,${alpha})`;
                        ctx.beginPath();
                        ctx.arc(n.x, n.y, n.r + (isRing1 ? pulse * 2 : 0), 0, Math.PI * 2);
                        ctx.fillStyle = color;
                        if (isRing1) {
                            ctx.shadowBlur = 15;
                            ctx.shadowColor = '#00e5ff';
                        }

                        ctx.shadowBlur = 0;

                });

                    let armAngle = angle + arm * (Math.PI * 2 / 3);
                    let r = 30 + Math.pow(Math.random(), 0.6) * Math.min(W, H) * 0.45;
                    let spread = r * 0.18;

                    stars.push({
                        tx: W / 2 + Math.cos(armAngle) * r + (Math.random() - 0.5) * spread,
                        ty: H / 2 + Math.sin(armAngle) * r * 0.5 + (Math.random() - 0.5) * spread * 0.5,
                        x: W / 2, y: H / 2, // start from center
                        vx: 0, vy: 0,
                        r: 0.5 + Math.random() * 1.8,
                        speed: 0.8 + Math.random() * 2.5,
                        hue: Math.random() > 0.6 ? 190 : (Math.random() > 0.5 ? 220 : 280),
                        brightness: 0.4 + Math.random() * 0.6,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            window.addEventListener('resize', buildScene);
            buildScene();

            let startTime = performance.now();

            function drawFrame(now) {
                if (!shouldAnimate(canvas)) {
                    requestAnimationFrame(drawFrame);
                    return;
                }

                // Trailing fade for motion blur effect
                ctx.fillStyle = 'rgba(4, 4, 20, 0.18)';
                ctx.fillRect(0, 0, W, H);

                let elapsed = (now - startTime) / 1000;

                // Phase 1 (0-3.5s): equations drift toward center
                if (elapsed < 3.5) {
                    eqDrifters.forEach(p => {
                        let dx = W / 2 - p.x;
                        let dy = H / 2 - p.y;
                        p.x += dx * p.speed;
                        p.y += dy * p.speed;

                        let dist = Math.sqrt(dx * dx + dy * dy);
                        let alpha = Math.min(0.7, dist / 200) * (1 - elapsed / 3.5);

                        ctx.globalAlpha = alpha;
                        ctx.font = `bold ${p.size}px 'Times New Roman'`;
                        ctx.fillStyle = '#00e5ff';
                        ctx.textAlign = 'center';
                        ctx.shadowBlur = 12;
                        ctx.shadowColor = '#00e5ff';
                        ctx.fillText(p.text, p.x, p.y);
                        ctx.shadowBlur = 0;
                    });

                    // Bright building core
                    let coreAlpha = Math.min(1, elapsed / 2);
                    let coreR = 4 + elapsed * 3;
                    let grad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, coreR * 3);
                    grad.addColorStop(0, `rgba(255,255,255,${coreAlpha})`);
                    grad.addColorStop(0.3, `rgba(0,229,255,${coreAlpha * 0.6})`);
                    grad.addColorStop(1, 'rgba(0,229,255,0)');
                    ctx.globalAlpha = 1;
                    ctx.beginPath();
                    ctx.arc(W / 2, H / 2, coreR * 3, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.fill();

                } else {
                    // Phase 2: Big Bang — stars explode outward into galaxy
                    if (!exploded) { exploded = true; explodeTime = elapsed; }

                    let t = elapsed - explodeTime;
                    let expandT = Math.min(1, t / 2.5); // 0 to 1 over 2.5s

                    // Flash at bang
                    if (t < 0.3) {
                        ctx.globalAlpha = (0.3 - t) / 0.3 * 0.8;
                        ctx.fillStyle = 'rgba(255,255,255,1)';
                        ctx.fillRect(0, 0, W, H);
                    }

                    // Draw galaxy stars
                    stars.forEach(s => {
                        s.x = W / 2 + (s.tx - W / 2) * expandT;
                        s.y = H / 2 + (s.ty - H / 2) * expandT;

                        let twinkle = 0.5 + Math.sin(elapsed * 3 + s.phase) * 0.5;
                        let alpha = expandT * s.brightness * (0.5 + twinkle * 0.5);

                        ctx.globalAlpha = alpha;
                        ctx.shadowBlur = 6 + twinkle * 6;
                        ctx.shadowColor = `hsl(${s.hue}, 100%, 70%)`;
                        ctx.beginPath();
                        ctx.arc(s.x, s.y, s.r * (0.5 + twinkle * 0.5), 0, Math.PI * 2);
                        ctx.fillStyle = `hsl(${s.hue}, 100%, ${70 + twinkle * 20}%)`;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    });

                    // Persistent center glow (the source)
                    let core = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, 80);
                    core.addColorStop(0, 'rgba(255,255,255,0.6)');
                    core.addColorStop(0.3, 'rgba(0,229,255,0.2)');
                    core.addColorStop(1, 'rgba(0,229,255,0)');
                    ctx.globalAlpha = 1;
                    ctx.beginPath();
                    ctx.arc(W / 2, H / 2, 80, 0, Math.PI * 2);
                    ctx.fillStyle = core;
                    ctx.fill();
                }

                ctx.globalAlpha = 1;
                requestAnimationFrame(drawFrame);
            }
            requestAnimationFrame(drawFrame);
        }
